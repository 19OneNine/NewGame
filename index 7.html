<!DOCTYPE html><html lang='ms'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Lucky Draw</title>
<style>
body{font-family:Arial;background:linear-gradient(#000,#3a2b00,#000);color:#fff;text-align:center;padding:20px}
input,button{padding:10px;margin:6px;border-radius:8px;border:none}button{background:gold;font-weight:bold}
.grid{display:none;grid-template-columns:repeat(5,1fr);gap:8px;max-width:420px;margin:20px auto}
.box{border:2px solid gold;background:#222;height:65px;display:flex;align-items:center;justify-content:center;font-size:28px;border-radius:8px;cursor:pointer}
#popup{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);align-items:center;justify-content:center}
.card{background:#111;border:2px solid gold;padding:20px;border-radius:12px;max-width:320px}
</style></head><body>
<h2>🎁 Lucky Draw 🎁</h2>
<input id='n' placeholder='Nama'><br><input id='p' placeholder='No Telefon'><br>
<button onclick='mula()'>MULA CABUTAN</button>
<div class='grid' id='g'><div class='box'>🎁</div><div class='box'>🎁</div><div class='box'>🎁</div><div class='box'>🎁</div><div class='box'>🎁</div><div class='box'>🎁</div><div class='box'>🎁</div><div class='box'>🎁</div><div class='box'>🎁</div><div class='box'>🎁</div><div class='box'>🎁</div><div class='box'>🎁</div><div class='box'>🎁</div><div class='box'>🎁</div><div class='box'>🎁</div><div class='box'>🎁</div><div class='box'>🎁</div><div class='box'>🎁</div><div class='box'>🎁</div><div class='box'>🎁</div></div>
<div id='popup'><div class='card'><h3>Hadiah Anda</h3><div id='r'></div><p>Sila Screen Shot dan Send Pada Admin Anda</p><button onclick='location.reload()'>Tutup</button></div></div>
<script>
let done=false;
const hadiah=["Harap Maaf, Jumpa Lagi","Harap Maaf, Jumpa Lagi","Harap Maaf, Jumpa Lagi","Harap Maaf, Jumpa Lagi","Harap Maaf, Jumpa Lagi","Harap Maaf, Jumpa Lagi","Harap Maaf, Jumpa Lagi","Harap Maaf, Jumpa Lagi","Discount 5%","Discount 10%","Cash RM10","Cash RM20","Cash RM30","Free Minyak 10L","50% T&S","60% T&S","🏆 FREE 1 HARI (Sewa 5 Hari Ke Atas)"];
function mula(){if(!n.value||!p.value){alert('Isi Nama & No Telefon');return;}g.style.display='grid';}
document.querySelectorAll('.box').forEach(b=>b.onclick=()=>{if(done)return;done=true;b.textContent='⏳';setTimeout(()=>{r.innerHTML=hadiah[Math.floor(Math.random()*hadiah.length)];popup.style.display='flex';},800);});
</script></body></html>
